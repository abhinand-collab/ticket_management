{% extends 'base.html' %}

{% block title %}Delete Registration{% endblock %}

{% block content %}
<div class="mb-4">
    <h2>Confirm Delete</h2>
</div>

<div class="row">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-body">
                <h5 class="card-title text-danger">Are you sure?</h5>
                <p class="card-text">
                    You are about to delete the registration for: <strong>{{ registration.name }}</strong>.
                    This attendee will be removed from the event list.
                </p>
                <form method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="{% url 'registrations:list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
