{% extends 'base.html' %}

{% block title %}Payment Failed{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center mt-5">
        <div class="card shadow">
            <div class="card-body py-5">
                <div class="text-danger mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" class="bi bi-x-circle-fill" viewBox="0 0 16 16">
                      <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zM5.354 4.646a.5.5 0 1 0-.708.708L7.293 8l-2.647 2.646a.5.5 0 0 0 .708.708L8 8.707l2.646 2.647a.5.5 0 0 0 .708-.708L8.707 8l2.647-2.646a.5.5 0 0 0-.708-.708L8 7.293 5.354 4.646z"/>
                    </svg>
                </div>
                <h2 class="mb-3">Payment Failed</h2>
                <p class="text-muted mb-4">We're sorry, but your transaction could not be processed. If any amount was deducted, it will be refunded shortly.</p>
                
                {% if error %}
                    <div class="alert alert-warning small">{{ error }}</div>
                {% endif %}

                <a href="{% url 'public:ticket_list' %}" class="btn btn-primary">Back to Tickets</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
